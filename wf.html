<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aafat Gaming | Whitelist</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:radial-gradient(circle at center,#050510,#000);
    overflow:hidden;
    color:white;
}

/* ===== STAR CANVAS ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ===== NAV BUTTONS ===== */
.back-btn, .toggle{
    position:fixed;
    top:20px;
    padding:8px 16px;
    border-radius:8px;
    text-decoration:none;
    border:2px solid #00f7ff;
    color:#00f7ff;
    box-shadow:0 0 15px #00f7ff;
    transition:0.3s;
    cursor:pointer;
}

.back-btn{ left:20px; }
.toggle{ right:20px; }

.back-btn:hover,
.toggle:hover{
    background:#00f7ff;
    color:black;
}

/* ===== CONTAINER ===== */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
    text-align:center;
}

/* ===== TITLE ===== */
.title{
    font-size:40px;
    margin-bottom:40px;
    letter-spacing:4px;
    text-shadow:0 0 30px #00f7ff;
}

/* ===== OPTION BOXES ===== */
.options{
    display:flex;
    gap:40px;
    margin-bottom:30px;
}

.option-box{
    width:170px;
    height:170px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:20px;
    border:2px solid #00f7ff;
    cursor:pointer;
    font-size:20px;
    position:relative;
    transition:all 0.4s ease;
    box-shadow:0 0 15px #00f7ff;
}

/* Neon animated glow */
.option-box::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:22px;
    background:linear-gradient(45deg,#00f7ff,#00ffcc,#00f7ff);
    background-size:400%;
    z-index:-1;
    opacity:0;
    transition:0.4s;
}

.option-box:hover::before{
    opacity:1;
    animation:glowMove 3s linear infinite;
}

@keyframes glowMove{
    0%{background-position:0%}
    100%{background-position:400%}
}

.option-box:hover{
    transform:scale(1.1);
    box-shadow:0 0 40px #00f7ff, 0 0 80px #00f7ff;
}

.option-box.active{
    background:#00f7ff;
    color:black;
    box-shadow:0 0 50px #00f7ff;
}

/* ===== DESCRIPTION FADE ===== */
.description{
    max-width:500px;
    margin-bottom:20px;
    min-height:60px;
    opacity:0;
    transition:opacity 0.5s ease;
}

.description.show{
    opacity:1;
}

/* ===== CONFIRM AREA ===== */
.confirm-area{
    display:none;
    flex-direction:column;
    align-items:center;
    gap:20px;
    opacity:0;
    transition:opacity 0.5s ease;
}

.confirm-area.show{
    opacity:1;
}

/* ===== FUTURISTIC CHECKBOX ===== */
.check-wrapper{
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
}

.check-wrapper input{
    display:none;
}

.custom-check{
    width:25px;
    height:25px;
    border:2px solid #00f7ff;
    border-radius:6px;
    position:relative;
    box-shadow:0 0 10px #00f7ff;
    transition:0.3s;
}

.custom-check::after{
    content:"";
    position:absolute;
    width:6px;
    height:12px;
    border:3px solid #00f7ff;
    border-top:none;
    border-left:none;
    transform:rotate(45deg) scale(0);
    top:2px;
    left:7px;
    transition:0.3s;
}

.check-wrapper input:checked + .custom-check{
    background:#00f7ff;
    box-shadow:0 0 20px #00f7ff, 0 0 40px #00f7ff;
}

.check-wrapper input:checked + .custom-check::after{
    transform:rotate(45deg) scale(1);
    border-color:black;
}

.continue-btn{
    padding:12px 30px;
    border-radius:10px;
    border:2px solid #00f7ff;
    background:transparent;
    color:#00f7ff;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

.continue-btn:hover{
    background:#00f7ff;
    color:black;
    box-shadow:0 0 20px #00f7ff;
}

</style>
</head>
<body>

<canvas id="space"></canvas>

<a href="index.html" class="back-btn">⬅ Back</a>
<div class="toggle" onclick="toggleSpeed()">Warp Mode</div>

<div class="container">

<div class="title">🚀 WHITELIST FORM 🚀</div>

<div class="options">
    <div class="option-box" onclick="selectOption('public')" id="publicBox">Public</div>
    <div class="option-box" onclick="selectOption('creator')" id="creatorBox">Creators</div>
</div>

<div class="description" id="descriptionText"></div>

<div class="confirm-area" id="confirmArea">
    <label class="check-wrapper">
        <input type="checkbox" id="agreeCheck">
        <div class="custom-check"></div>
        I am ready to fill the form
    </label>
    <button class="continue-btn" onclick="goNext()">Continue</button>
</div>

</div>

<script>

/* ===== STAR EFFECT (same as yours) ===== */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let stars = [];
let speedMultiplier = 1;

class Star{
    constructor(){ this.reset(); }
    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2;
        this.speed = Math.random()*1 + 0.5;
    }
    update(){
        this.y += this.speed * speedMultiplier;
        if(this.y > canvas.height){
            this.y = 0;
            this.x = Math.random()*canvas.width;
        }
    }
    draw(){
        ctx.beginPath();
        ctx.fillStyle="white";
        if(speedMultiplier > 1){
            ctx.fillRect(this.x,this.y,this.size,this.size*4);
        }else{
            ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
            ctx.fill();
        }
    }
}

for(let i=0;i<500;i++){
    stars.push(new Star());
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    stars.forEach(star=>{
        star.update();
        star.draw();
    });
    requestAnimationFrame(animate);
}
animate();

function toggleSpeed(){
    speedMultiplier = speedMultiplier === 1 ? 6 : 1;
}

/* ===== LOGIC ===== */
let selectedType = "";

function selectOption(type){
    selectedType = type;

    document.getElementById("publicBox").classList.remove("active");
    document.getElementById("creatorBox").classList.remove("active");
    document.getElementById(type+"Box").classList.add("active");

    const desc = document.getElementById("descriptionText");
    const confirm = document.getElementById("confirmArea");

    desc.classList.remove("show");

    setTimeout(()=>{
        if(type==="public"){
            desc.innerHTML="Public whitelist is for normal players who want to join Aafat Gaming SMP.";
        }else{
            desc.innerHTML="Creator whitelist is for YouTubers & streamers who want to create content.";
        }
        desc.classList.add("show");
    },200);

    confirm.style.display="flex";
    setTimeout(()=>confirm.classList.add("show"),100);
}

function goNext(){
    if(!document.getElementById("agreeCheck").checked){
        alert("Please confirm before continuing.");
        return;
    }

    if(selectedType==="public"){
        window.location.href="public.html";
    }

    if(selectedType==="creator"){

        const clientId = "1479118620641726556"
        const redirect = "https://aafatgaming.fun/creator.html"

        const discordAuth =
        `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirect)}&response_type=token&scope=identify`

        window.location.href = discordAuth
    }
}

</script>

</body>
</html>
