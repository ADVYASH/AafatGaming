<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aafat Gaming | Ultra Space</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:radial-gradient(circle at center,#050510,#000);
    overflow:hidden;
    color:white;
}

/* ===== STAR CANVAS ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ===== NAV BUTTONS ===== */
.back-btn, .toggle{
    position:fixed;
    top:20px;
    padding:8px 16px;
    border-radius:8px;
    text-decoration:none;
    border:2px solid #00f7ff;
    color:#00f7ff;
    box-shadow:0 0 15px #00f7ff;
    transition:0.3s;
    cursor:pointer;
}

.back-btn{ left:20px; }
.toggle{ right:20px; }

.back-btn:hover,
.toggle:hover{
    background:#00f7ff;
    color:black;
}

/* ===== CENTER CONTAINER ===== */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

/* ===== TITLE ===== */
.title{
    font-size:42px;
    margin-bottom:50px;
    letter-spacing:4px;
    text-shadow:0 0 30px #00f7ff;
    animation:pulse 2s infinite alternate;
}

@keyframes pulse{
    from{ text-shadow:0 0 20px #00f7ff; }
    to{ text-shadow:0 0 60px #00f7ff,0 0 100px #00f7ff; }
}

/* ===== GLASS CARD ===== */
.card{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:20px;
    padding:30px;
    border-radius:20px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.05);
    box-shadow:0 0 60px rgba(0,255,255,0.3);
}

/* ===== RGB BORDER BUTTON ===== */
.social-btn{
    position:relative;
    padding:18px;
    border-radius:15px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-size:18px;
    overflow:hidden;
    background:rgba(0,0,0,0.85);
    transition:0.3s;
}

.social-btn::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:15px;
    background:linear-gradient(45deg,
        red,orange,yellow,green,cyan,blue,violet,red);
    background-size:400%;
    z-index:-1;
    animation:rgb 6s linear infinite;
}

@keyframes rgb{
    0%{background-position:0%}
    100%{background-position:400%}
}

.social-btn::after{
    content:"";
    position:absolute;
    inset:2px;
    background:rgba(0,0,0,0.95);
    border-radius:13px;
    z-index:-1;
}

.social-btn:hover{
    transform:scale(1.08);
}

.donate::before{
    background:linear-gradient(45deg,#ff0066,#ff3399,#ff0066);
    background-size:300%;
    animation:rgb 3s linear infinite;
}

.social-btn i{
    margin-right:10px;
    font-size:20px;
}

.fa-instagram{ color:#ff4fd8; }
.fa-youtube{ color:#ff0000; }
.fa-discord{ color:#5865F2; }
.fa-gem{ color:#00cfff; }
.fa-coins{ color:#ffd700; }

@media(max-width:600px){
    .title{font-size:26px;}
}

</style>
</head>
<body>

<canvas id="space"></canvas>

<a href="index.html" class="back-btn">⬅ Back</a>
<div class="toggle" onclick="toggleSpeed()">Warp Mode</div>

<div class="container">
<div class="title">🔥 AAFAT GAMING 🔥</div>

<div class="card">
    <a href="https://www.instagram.com/ig_aafatyt" target="_blank" class="social-btn">
        <i class="fab fa-instagram"></i> Instagram
    </a>

    <a href="https://youtube.com/@mafiaaafat" target="_blank" class="social-btn">
        <i class="fab fa-youtube"></i> YouTube
    </a>

    <a href="https://www.youtube.com/channel/UC3OpDrKArRJ5Jryn3U8Fdew/join" target="_blank" class="social-btn">
        <i class="fas fa-gem"></i> Membership
    </a>

    <a href="https://discord.gg/jqEfUtnfYR" target="_blank" class="social-btn">
        <i class="fab fa-discord"></i> Discord
    </a>

    <a href="donate.html" class="social-btn donate">
        <i class="fas fa-coins"></i> Donate
    </a>
</div>
</div>

<script>

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let stars = [];
let speedMultiplier = 1;

class Star{
    constructor(){
        this.reset();
    }

    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2;
        this.speed = Math.random()*1 + 0.5;
    }

    update(){
        this.y += this.speed * speedMultiplier;
        if(this.y > canvas.height){
            this.y = 0;
            this.x = Math.random()*canvas.width;
        }
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle="white";
        if(speedMultiplier > 1){
            ctx.fillRect(this.x,this.y,this.size, this.size*4);
        }else{
            ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
            ctx.fill();
        }
    }
}

for(let i=0;i<500;i++){
    stars.push(new Star());
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{
        star.update();
        star.draw();
    });

    requestAnimationFrame(animate);
}

animate();

function toggleSpeed(){
    speedMultiplier = speedMultiplier === 1 ? 6 : 1;
}

</script>

</body>
</html>
