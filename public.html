<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aafat Gaming | Public Whitelist</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:'Orbitron',sans-serif;
    background:radial-gradient(circle at center,#050510,#000);
    overflow:hidden;
    color:white;
    text-align:center;
}

/* ===== STAR CANVAS ===== */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* ===== NAV BUTTONS ===== */
.back-btn, .toggle{
    position:fixed;
    top:20px;
    padding:8px 16px;
    border-radius:8px;
    text-decoration:none;
    border:2px solid #00f7ff;
    color:#00f7ff;
    box-shadow:0 0 15px #00f7ff;
    transition:0.3s;
    cursor:pointer;
}

.back-btn{ left:20px; }
.toggle{ right:20px; }

.back-btn:hover,
.toggle:hover{
    background:#00f7ff;
    color:black;
}

/* ===== CENTER CONTENT ===== */
.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.main-title{
    font-size:38px;
    letter-spacing:3px;
    text-shadow:0 0 30px #00f7ff;
    margin-bottom:20px;
}

.sub-text{
    font-size:20px;
    opacity:0.8;
    text-shadow:0 0 15px #00f7ff;
}

@media(max-width:600px){
    .main-title{ font-size:26px; }
    .sub-text{ font-size:16px; }
}

</style>
</head>
<body>

<canvas id="space"></canvas>

<a href="wf.html" class="back-btn">⬅ Back</a>
<div class="toggle" onclick="toggleSpeed()">Warp Mode</div>

<div class="container">
    <div class="main-title">🚀 PUBLIC WHITELIST FORM 🚀</div>
    <div class="sub-text">Coming Soon...</div>
</div>

<script>

/* ===== STAR EFFECT ===== */

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let stars = [];
let speedMultiplier = 1;

class Star{
    constructor(){ this.reset(); }
    reset(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2;
        this.speed = Math.random()*1 + 0.5;
    }
    update(){
        this.y += this.speed * speedMultiplier;
        if(this.y > canvas.height){
            this.y = 0;
            this.x = Math.random()*canvas.width;
        }
    }
    draw(){
        ctx.beginPath();
        ctx.fillStyle="white";
        if(speedMultiplier > 1){
            ctx.fillRect(this.x,this.y,this.size,this.size*4);
        }else{
            ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
            ctx.fill();
        }
    }
}

for(let i=0;i<500;i++){
    stars.push(new Star());
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.5)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    stars.forEach(star=>{
        star.update();
        star.draw();
    });

    requestAnimationFrame(animate);
}

animate();

function toggleSpeed(){
    speedMultiplier = speedMultiplier === 1 ? 6 : 1;
}

</script>

</body>
</html>
